<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Pohon Silsilah Keluarga</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #b8934a;
  --gold-lt: #ddb96a;
  --cream: #faf6ee;
  --bark: #3b2a1a;
  --bark-mid: #6b4c30;
  --bark-lt: #9a7050;
  --green: #4a7c59;
  --card-bg: #ffffff;
  --shadow: 0 4px 24px rgba(59,42,26,0.10);
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Lato', sans-serif;
  background: var(--cream);
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%, rgba(201,168,76,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 90%, rgba(74,124,89,0.07) 0%, transparent 60%);
  pointer-events: none;
}

header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  text-align: center;
  padding: 0.8rem 1rem 0.6rem;
  background: rgba(250,246,238,0.95);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(184,147,74,0.2);
  box-shadow: 0 2px 12px rgba(59,42,26,0.08);
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 4vw, 1.8rem);
  color: var(--bark);
  line-height: 1.2;
}
header h1 em { color: var(--gold); font-style: italic; }
header p {
  margin-top: 0.2rem;
  font-size: 0.72rem;
  color: var(--bark-lt);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.ornament {
  display: flex; align-items: center; justify-content: center;
  gap: 0.6rem; margin: 0.4rem auto 0; width: 160px;
  color: var(--gold); font-size: 0.75rem;
}
.ornament::before,.ornament::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-lt));
}
.ornament::after { background: linear-gradient(to left, transparent, var(--gold-lt)); }

/* Hint zoom */
.zoom-hint {
  position: fixed;
  bottom: 1rem; left: 50%; transform: translateX(-50%);
  z-index: 100;
  background: rgba(59,42,26,0.75);
  color: #fff;
  font-size: 0.7rem;
  padding: 0.35rem 0.9rem;
  border-radius: 999px;
  letter-spacing: 0.06em;
  pointer-events: none;
  opacity: 1;
  transition: opacity 1s;
}
.zoom-hint.hide { opacity: 0; }

/* Zoom reset button */
.btn-reset {
  position: fixed;
  bottom: 1rem; right: 1rem;
  z-index: 100;
  background: var(--gold);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 40px; height: 40px;
  font-size: 1.1rem;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s;
}
.btn-reset:active { transform: scale(0.9); background: var(--bark-mid); }

/* Canvas / pan area */
#canvas-wrap {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  cursor: grab;
}
#canvas-wrap.grabbing { cursor: grabbing; }

#tree-canvas {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  will-change: transform;
  padding: 6rem 3rem 5rem;
}

/* Each column = one node + its subtree below it */
.col {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 8px;
}

/* Vertical line from node down to children */
.col-vline {
  width: 2px;
  background: linear-gradient(to bottom, var(--gold-lt), var(--bark-mid));
  flex-shrink: 0;
}

/* Row of sibling columns */
.children-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  position: relative;
}

/* ── NODE CARD ── */
.node {
  background: var(--card-bg);
  border: 1.5px solid var(--gold-lt);
  border-radius: 14px;
  box-shadow: var(--shadow);
  text-align: center;
  width: 160px;
  flex-shrink: 0;
  overflow: hidden;
  animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.8) translateY(-10px); }
  to   { opacity:1; transform:scale(1)   translateY(0); }
}

@keyframes fadeSlide {
  from { opacity:0; transform: translateY(-6px); }
  to   { opacity:1; transform: translateY(0); }
}

.children-wrap {
  animation: fadeSlide 0.28s ease both;
}

.node.clickable { cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; }
.node.clickable:active {
  transform: scale(0.96);
  box-shadow: 0 2px 8px rgba(184,147,74,0.18);
}
.node.is-root {
  background: linear-gradient(145deg,#fffdf8,#fff8ec);
  border-color: var(--gold);
  width: 200px;
}
.node.expanded { border-color: var(--gold); background: #fffcf3; }

.node-bar {
  height: 4px;
  background: linear-gradient(90deg, var(--gold-lt), var(--gold), var(--gold-lt));
}
.node-inner { padding: 0.75rem 0.8rem 0.8rem; }

.couple-row {
  display: flex; align-items: center;
  justify-content: center; gap: 0.35rem;
}
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; border: 2px solid var(--gold-lt); flex-shrink: 0;
}
.avatar.m { background: linear-gradient(135deg,#ddeeff,#aaccee); }
.avatar.f { background: linear-gradient(135deg,#ffdde6,#ffaabb); }
.names { text-align: center; }
.name1 {
  font-family: 'Playfair Display', serif;
  font-size: 0.82rem; color: var(--bark); font-weight: 700;
  line-height: 1.25;
}
.heart { color: #c94c4c; font-size: 0.8rem; }
.sub-name { font-size: 0.68rem; color: var(--bark-lt); font-weight: 300; margin-top: 1px; }

.single-name {
  font-family: 'Playfair Display', serif;
  font-size: 0.8rem; color: var(--bark); font-weight: 700;
  line-height: 1.3;
}
.amp { font-size: 0.68rem; color: var(--bark-lt); margin-top: 2px; }
.expand-hint {
  font-size: 0.64rem; color: var(--gold); margin-top: 4px; opacity: 0.9;
}

.badge {
  display: inline-block;
  background: var(--green); color: #fff;
  font-size: 0.55rem; font-weight: 700;
  width: 15px; height: 15px; border-radius: 50%;
  line-height: 15px; text-align: center;
  margin-left: 4px; vertical-align: middle;
  border: 1.5px solid var(--cream);
}

.gen-label {
  font-size: 0.6rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--bark-lt);
  font-weight: 700; text-align: center;
  margin-bottom: 8px; margin-top: 6px;
  width: 100%;
}

.connector-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  overflow: visible;
  pointer-events: none;
}
</style>
</head>
<body>

<header>
  <h1>Pohon Silsilah <em>Keluarga</em></h1>
  <p>Ketuk nama untuk melihat keturunannya</p>
  <div class="ornament">✦</div>
</header>

<div id="canvas-wrap">
  <div id="tree-canvas"></div>
</div>

<div class="zoom-hint" id="zoomHint">🤏 Cubit untuk zoom · Geser untuk pindah</div>
<button class="btn-reset" id="btnReset" title="Reset zoom">⌂</button>

<script>
// ═══════════════════════════════════════════
//  DATA KELUARGA
// ═══════════════════════════════════════════
const DATA = {
  id: 'root',
  husband: { name: 'Djamaliah', born: '---' },
  wife:    { name: 'Rukaja' },
  children: [
    {
      id: 'c1',
      husband: { name: 'Feby Mardianti', born: '1975' },
      wife:    { name: 'Iwan Hermawan' },
      children: [
        {
          id: 'c1a',
          husband: { name: 'Muhammad Ganesh Musyafa Aries Tama', born: '1998' },
          wife:    { name: 'Anandita Gadisya Riezkya Adhy Putri' },
          children: []
        },
        {
          id: 'c1b',
          husband: { name: 'Muhammad Azkal Azkiya', born: '2004' },
          wife:    { name: '-' },
          children: []
        }
      ]
    },
    {
      id: 'c2',
      husband: { name: 'Diane Utami', born: '1978' },
      wife:    { name: 'Ari Irawan' },
      children: [
        {
          id: 'c2a',
          husband: { name: 'Muhammad Ardian Fatiha Irawan', born: '2005' },
          wife:    { name: '-' },
          children: []
        }
      ]
    },
    {
      id: 'c3',
      husband: { name: 'Vien sofriani', born: '1978' },
      wife:    { name: 'Hari Kuntoro' },
      children: [
        {
          id: 'c3a',
          husband: { name: 'Nadine Meisya Aurellia Kuntoro', born: '2005' },
          wife:    { name: '-' },
          children: []
        },
        {
          id: 'c3b',
          husband: { name: 'Keisya Nabila Mecca Kuntoro', born: '2007' },
          wife:    { name: '-' },
          children: []
        },
        {
          id: 'c3c',
          husband: { name: 'Nadia Sabrina Putri Kuntoro', born: '2010' },
          wife:    { name: '-' },
          children: []
        }
      ]
    },
    {
      id: 'c4',
      husband: { name: 'Nia Silviana', born: '1980' },
      wife:    { name: 'Ferry Suhendar' },
      children: [
        {
          id: 'c4a',
          husband: { name: 'Ibrahim Alfaiz Leonel Negara', born: '2005' },
          wife:    { name: '-' },
          children: []
        },
        {
          id: 'c4b',
          husband: { name: 'Ismail', born: '2008' },
          wife:    { name: '-' },
          children: []
        }
      ]
    }
  ]
};
// ═══════════════════════════════════════════

const VGAP = 36;
const expanded = new Set();

function genName(d) {
  const g = ['Generasi Pertama','Generasi Kedua','Generasi Ketiga','Generasi Keempat','Generasi Kelima'];
  return g[d] || `Generasi ke-${d+1}`;
}

function buildCol(node, isRoot, depth) {
  const col = document.createElement('div');
  col.className = 'col';

  const card = makeCard(node, isRoot);
  col.appendChild(card);

  if (node.children && node.children.length > 0) {
    card.classList.add('clickable');

    const vline = document.createElement('div');
    vline.className = 'col-vline';
    vline.style.height = VGAP + 'px';
    col.appendChild(vline);

    const childWrap = document.createElement('div');
    childWrap.className = 'children-wrap';
    childWrap.style.display = 'none';
    col.appendChild(childWrap);

    if (expanded.has(node.id)) {
      card.classList.add('expanded');
      childWrap.style.display = 'block';
      buildChildrenInto(node, childWrap, depth + 1);
      updateHint(card, node, true);
    }

    card.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = expanded.has(node.id);
      if (isOpen) {
        expanded.delete(node.id);
        card.classList.remove('expanded');
        childWrap.style.display = 'none';
        childWrap.innerHTML = '';
        updateHint(card, node, false);
      } else {
        expanded.add(node.id);
        card.classList.add('expanded');
        childWrap.style.display = 'block';
        buildChildrenInto(node, childWrap, depth + 1);
        updateHint(card, node, true);
        requestAnimationFrame(() => {
          const row = childWrap.querySelector('.children-row');
          if (row) drawHBar(row);
        });
      }
    });
  }

  return col;
}

function buildChildrenInto(node, wrap, depth) {
  wrap.innerHTML = '';
  const lbl = document.createElement('div');
  lbl.className = 'gen-label';
  lbl.textContent = genName(depth);
  wrap.appendChild(lbl);

  const row = document.createElement('div');
  row.className = 'children-row';
  wrap.appendChild(row);

  node.children.forEach(child => {
    row.appendChild(buildCol(child, false, depth));
  });

  requestAnimationFrame(() => drawHBar(row));
}

function drawHBar(row) {
  const old = row.querySelector(':scope > .connector-svg');
  if (old) old.remove();

  const cols = row.querySelectorAll(':scope > .col');
  if (cols.length < 2) return;

  const cards = Array.from(cols).map(c => c.querySelector('.node'));
  if (cards.some(c => !c)) return;

  const rowRect = row.getBoundingClientRect();
  const xs = cards.map(c => {
    const r = c.getBoundingClientRect();
    return r.left + r.width / 2 - rowRect.left;
  });

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('connector-svg');
  svg.style.width  = rowRect.width + 'px';
  svg.style.height = '2px';

  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', xs[0]); line.setAttribute('y1', 1);
  line.setAttribute('x2', xs[xs.length-1]); line.setAttribute('y2', 1);
  line.setAttribute('stroke','#c9a87a');
  line.setAttribute('stroke-width','2');
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);
  row.insertBefore(svg, row.firstChild);
}

function updateHint(card, node, open) {
  const hint = card.querySelector('.expand-hint');
  if (hint) hint.textContent = open ? '▴ tutup' : `▾ ${node.children.length} anak`;
}

function makeCard(node, isRoot) {
  const el = document.createElement('div');
  el.className = 'node' + (isRoot ? ' is-root' : '');

  const bar = document.createElement('div');
  bar.className = 'node-bar';
  el.appendChild(bar);

  const inner = document.createElement('div');
  inner.className = 'node-inner';

  if (isRoot) {
    const row = document.createElement('div');
    row.className = 'couple-row';
    const avH = document.createElement('div');
    avH.className = 'avatar m'; avH.textContent = '👨';
    const names = document.createElement('div');
    names.className = 'names';
    names.innerHTML = `
      <div class="name1">${node.husband.name}</div>
      <div class="heart">♥</div>
      <div class="name1">${node.wife.name}</div>
      <div class="sub-name">menikah · ${node.husband.born || ''}</div>
    `;
    const avW = document.createElement('div');
    avW.className = 'avatar f'; avW.textContent = '👩';
    row.append(avH, names, avW);
    inner.appendChild(row);
  } else {
    const wifeText = node.wife.name !== '-' ? '& ' + node.wife.name : '';
    const hasKids = node.children && node.children.length > 0;
    const badge = hasKids ? `<span class="badge">${node.children.length}</span>` : '';
    inner.innerHTML = `
      <div class="single-name">${node.husband.name}${badge}</div>
      ${wifeText ? `<div class="amp">${wifeText}</div>` : ''}
      ${hasKids ? `<div class="expand-hint">▾ ${node.children.length} anak</div>` : ''}
    `;
  }

  el.appendChild(inner);
  return el;
}

function init() {
  const canvas = document.getElementById('tree-canvas');
  canvas.innerHTML = '';

  const lbl = document.createElement('div');
  lbl.className = 'gen-label';
  lbl.style.paddingTop = '0.5rem';
  lbl.textContent = genName(0);
  canvas.appendChild(lbl);

  const center = document.createElement('div');
  center.style.cssText = 'display:flex;justify-content:center;';
  canvas.appendChild(center);
  center.appendChild(buildCol(DATA, true, 0));

  requestAnimationFrame(() => {
    canvas.querySelectorAll('.children-row').forEach(drawHBar);
  });
}

init();

// ═══════════════════════════════════════════
//  PAN & PINCH ZOOM
// ═══════════════════════════════════════════
const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('tree-canvas');

let scale = 1;
let translateX = 0;
let translateY = 80;
let lastScale = 1;

// Center canvas initially
function centerCanvas() {
  const cw = wrap.clientWidth;
  translateX = Math.max(0, (cw - canvas.scrollWidth * scale) / 2);
  translateY = 80;
  applyTransform();
}

function applyTransform() {
  canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
}

// After init, center
requestAnimationFrame(() => {
  centerCanvas();
});

// ── Touch pan & pinch ──
let touches = [];
let lastMidX = 0, lastMidY = 0;
let lastDist = 0;
let isDragging = false;
let touchStartTime = 0;
let touchStartX = 0, touchStartY = 0;

wrap.addEventListener('touchstart', (e) => {
  touches = Array.from(e.touches);
  touchStartTime = Date.now();
  if (touches.length === 1) {
    lastMidX = touches[0].clientX;
    lastMidY = touches[0].clientY;
    touchStartX = touches[0].clientX;
    touchStartY = touches[0].clientY;
    isDragging = false;
  } else if (touches.length === 2) {
    lastDist = Math.hypot(
      touches[1].clientX - touches[0].clientX,
      touches[1].clientY - touches[0].clientY
    );
    lastMidX = (touches[0].clientX + touches[1].clientX) / 2;
    lastMidY = (touches[0].clientY + touches[1].clientY) / 2;
    lastScale = scale;
  }
}, { passive: true });

wrap.addEventListener('touchmove', (e) => {
  e.preventDefault();
  touches = Array.from(e.touches);

  if (touches.length === 1) {
    const dx = touches[0].clientX - lastMidX;
    const dy = touches[0].clientY - lastMidY;
    translateX += dx;
    translateY += dy;
    lastMidX = touches[0].clientX;
    lastMidY = touches[0].clientY;
    if (Math.abs(touches[0].clientX - touchStartX) > 5 || Math.abs(touches[0].clientY - touchStartY) > 5) {
      isDragging = true;
      wrap.classList.add('grabbing');
    }
    applyTransform();
  } else if (touches.length === 2) {
    isDragging = true;
    const dist = Math.hypot(
      touches[1].clientX - touches[0].clientX,
      touches[1].clientY - touches[0].clientY
    );
    const midX = (touches[0].clientX + touches[1].clientX) / 2;
    const midY = (touches[0].clientY + touches[1].clientY) / 2;

    const newScale = Math.min(3, Math.max(0.3, lastScale * (dist / lastDist)));
    const scaleRatio = newScale / scale;

    translateX = midX - scaleRatio * (midX - translateX);
    translateY = midY - scaleRatio * (midY - translateY);

    const panDx = midX - lastMidX;
    const panDy = midY - lastMidY;
    translateX += panDx;
    translateY += panDy;

    scale = newScale;
    lastMidX = midX;
    lastMidY = midY;
    applyTransform();
  }
}, { passive: false });

wrap.addEventListener('touchend', (e) => {
  wrap.classList.remove('grabbing');
  touches = Array.from(e.touches);
  if (touches.length === 1) {
    lastMidX = touches[0].clientX;
    lastMidY = touches[0].clientY;
    lastScale = scale;
  }
  if (touches.length === 0) {
    lastScale = scale;
  }
}, { passive: true });

// ── Mouse pan (desktop) ──
let mouseDown = false;
let mouseStartX = 0, mouseStartY = 0;
let mouseMoveDist = 0;

wrap.addEventListener('mousedown', (e) => {
  mouseDown = true;
  mouseStartX = e.clientX;
  mouseStartY = e.clientY;
  mouseMoveDist = 0;
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  const dx = e.clientX - mouseStartX;
  const dy = e.clientY - mouseStartY;
  mouseMoveDist += Math.abs(dx) + Math.abs(dy);
  translateX += e.movementX;
  translateY += e.movementY;
  applyTransform();
  mouseStartX = e.clientX;
  mouseStartY = e.clientY;
});
window.addEventListener('mouseup', () => {
  mouseDown = false;
  wrap.classList.remove('grabbing');
});

// Mouse wheel zoom
wrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(3, Math.max(0.3, scale * delta));
  const ratio = newScale / scale;
  translateX = e.clientX - ratio * (e.clientX - translateX);
  translateY = e.clientY - ratio * (e.clientY - translateY);
  scale = newScale;
  applyTransform();
}, { passive: false });

// Reset button
document.getElementById('btnReset').addEventListener('click', () => {
  scale = 1;
  translateX = 0;
  translateY = 80;
  centerCanvas();
});

// Hide zoom hint after 4s
setTimeout(() => {
  document.getElementById('zoomHint').classList.add('hide');
}, 4000);
</script>
</body>
</html>
