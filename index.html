<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pohon Silsilah Keluarga</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #faf6ee;
    --bark: #3b2a1a;
    --bark-mid: #5c3d26;
    --bark-light: #8c6340;
    --leaf: #4a7c59;
    --leaf-light: #6aaa7a;
    --shadow: rgba(59,42,26,0.18);
  }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(74,124,89,0.08) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3rem 1rem 1.5rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--bark);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  header h1 span {
    color: var(--gold);
    font-style: italic;
  }

  header p {
    margin-top: 0.5rem;
    font-size: 1rem;
    color: var(--bark-light);
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    justify-content: center;
    margin: 0.8rem auto 0;
    width: 220px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .divider::after { background: linear-gradient(to left, transparent, var(--gold)); }

  .divider-icon {
    font-size: 1rem;
    color: var(--gold);
  }

  /* Tree container */
  #tree {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
    padding: 1rem 1rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Generation row */
  .gen-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    animation: fadeDown 0.5s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Couple wrapper */
  .couple-wrap {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.4rem;
  }

  .heart-icon {
    font-size: 1.1rem;
    color: #c94c4c;
    animation: pulse 2s infinite;
    user-select: none;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.2); }
  }

  /* Person card */
  .person-card {
    position: relative;
    background: white;
    border: 1.5px solid var(--gold-light);
    border-radius: 14px;
    padding: 1rem 1.6rem;
    cursor: pointer;
    transition: all 0.28s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 2px 16px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.9);
    min-width: 130px;
    text-align: center;
    user-select: none;
  }

  .person-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--gold-light), transparent 60%);
    opacity: 0;
    transition: opacity 0.28s;
    pointer-events: none;
  }

  .person-card:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 32px rgba(201,168,76,0.22), 0 2px 8px var(--shadow);
    border-color: var(--gold);
  }

  .person-card:hover::before { opacity: 0.25; }

  .person-card.has-children:hover .expand-hint { opacity: 1; }

  .person-card.couple-container {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    cursor: default;
    background: linear-gradient(135deg, #fffdf7, white);
    min-width: 260px;
  }

  .couple-names {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.1rem;
  }

  .name-main {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--bark);
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  .name-sub {
    font-size: 0.78rem;
    color: var(--bark-light);
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Single clickable person (child, expandable) */
  .person-card.clickable .name-main { color: var(--bark); }

  .expand-hint {
    font-size: 0.7rem;
    color: var(--gold);
    margin-top: 0.25rem;
    opacity: 0;
    transition: opacity 0.2s;
    letter-spacing: 0.04em;
  }

  .person-card.has-children .expand-hint { opacity: 0.6; }

  /* Avatar circle */
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
    border: 2px solid var(--gold-light);
  }

  .avatar.male   { background: linear-gradient(135deg, #ddeeff, #aaccee); }
  .avatar.female { background: linear-gradient(135deg, #ffdde6, #ffaabb); }

  /* Connector lines */
  .connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .line-v {
    width: 2px;
    height: 36px;
    background: linear-gradient(to bottom, var(--gold-light), var(--bark-mid));
    border-radius: 1px;
  }

  .line-h-wrap {
    display: flex;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  .children-row {
    display: flex;
    gap: 2.5rem;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
  }

  .children-row::before {
    content: '';
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 100px);
    height: 2px;
    background: linear-gradient(to right, transparent, var(--bark-mid), transparent);
  }

  .child-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .child-col::before {
    content: '';
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 36px;
    background: linear-gradient(to bottom, var(--bark-mid), var(--gold-light));
  }

  /* Children subtree */
  .subtree {
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Leaf decorations */
  .leaf-deco {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.07;
    font-size: 6rem;
    user-select: none;
  }

  .leaf-deco.tl { top: 2%; left: 1%; transform: rotate(-30deg); }
  .leaf-deco.tr { top: 2%; right: 1%; transform: rotate(30deg) scaleX(-1); }
  .leaf-deco.bl { bottom: 5%; left: 1%; transform: rotate(30deg); }
  .leaf-deco.br { bottom: 5%; right: 1%; transform: rotate(-30deg) scaleX(-1); }

  /* Generation label */
  .gen-label {
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--bark-light);
    margin-bottom: 0.6rem;
    font-weight: 500;
  }

  /* Tooltip badge */
  .badge-children {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--leaf);
    color: white;
    font-size: 0.6rem;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    border: 2px solid white;
    box-shadow: 0 2px 6px var(--shadow);
  }

  footer {
    position: relative;
    z-index: 1;
    padding: 1rem;
    color: var(--bark-light);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    opacity: 0.7;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Leaf decorations -->
<div class="leaf-deco tl">🌿</div>
<div class="leaf-deco tr">🌿</div>
<div class="leaf-deco bl">🍃</div>
<div class="leaf-deco br">🍃</div>

<header>
  <h1>Pohon Silsilah <span>Keluarga</span></h1>
  <p>Klik nama untuk melihat keturunannya</p>
  <div class="divider"><span class="divider-icon">✦</span></div>
</header>

<div id="tree"></div>

<footer>✦ Klik pada kartu nama untuk membuka cabang keluarga ✦</footer>

<script>

// ============================================================
const familyData = {
  id: "root",
  husband: { name: "Djamaliah", gender: "male", born: "1950" },
  wife:    { name: "kake",   gender: "female", born: "1953" },
  children: [
    {

      wife:    { name: "Iwan Hermawan",  gender: "female", born: "1977" },
      children: [
        {
          id: "c1a",
          husband: { name: "Muhammad Ganesh Musyafa Arias Tama",  gender: "male",   born: "2000" },
          wife:    { name: "Gadis",    gender: "female", born: "2002" },
          children: []
        },
        {
          id: "c1b",
          husband: { name: "Muhammad Azkal Azkiya",  gender: "male",   born: "2003" },
          wife:    { name: "gakada",     gender: "female", born: "2005" },
          children: []
        }
      ]
    },
    {
      id: "c2",
      husband: { name: "Diane Utami",   gender: "male",   born: "1978" },
      wife:    { name: "Ari Irawan",gender: "female", born: "1980" },
      children: [
        {
          id: "c2a",
          husband: { name: "Ardian Fatiha",  gender: "male",   born: "2005" },
          wife:    { name: "Kosong",    gender: "female", born: "2006" },
          children: []
        },
      ]
    },
    {
      id: "c3",
      husband: { name: "Vien",   gender: "male",   born: "1978" },
      wife:    { name: "Hari Kuntoro",gender: "female", born: "1980" },
      children: [
        {
          id: "c3a",
          husband: { name: "Nadine",  gender: "male",   born: "2005" },
          wife:    { name: "Kosong",    gender: "female", born: "2006" },
          children: []
        },
         {
          id: "c3b",
          husband: { name: "Nabila",  gender: "male",   born: "2005" },
          wife:    { name: "Kosong",    gender: "female", born: "2006" },
          children: []
        },
         {
          id: "c3c",
          husband: { name: "Nadia",  gender: "male",   born: "2005" },
          wife:    { name: "Kosong",    gender: "female", born: "2006" },
          children: []
        },
      ]
    },
    {
      id: "c4",
      husband: { name: "Nia Silviana",   gender: "male",   born: "1978" },
      wife:    { name: "Ferry Suhendar",gender: "female", born: "1980" },
      children: [
        {
          id: "c4a",
          husband: { name: "Ibrahim Alfaiz Leonel Negara",  gender: "male",   born: "2005" },
          wife:    { name: "-",    gender: "female", born: "2006" },
          children: []
        },
         {
          id: "c4b",
          husband: { name: "Ismail",  gender: "male",   born: "2005" },
          wife:    { name: "-",    gender: "female", born: "2006" },
          children: []
        },
      ]
    }
  ]
};

// State: which nodes are expanded
const expanded = new Set();

function genLabel(depth) {
  const labels = ["Generasi Pertama", "Generasi Kedua", "Generasi Ketiga", "Generasi Keempat"];
  return labels[depth] || `Generasi ke-${depth + 1}`;
}

function renderNode(node, depth) {
  const el = document.createElement('div');
  el.className = 'gen-row';
  el.style.animationDelay = (depth * 0.08) + 's';

  // Generation label
  const label = document.createElement('div');
  label.className = 'gen-label';
  label.textContent = genLabel(depth);
  el.appendChild(label);

  // Couple card
  const couple = document.createElement('div');
  couple.className = 'person-card couple-container';

  const avatarH = document.createElement('div');
  avatarH.className = 'avatar male';
  avatarH.textContent = '👨';

  const names = document.createElement('div');
  names.className = 'couple-names';

  const nameH = document.createElement('div');
  nameH.className = 'name-main';
  nameH.textContent = node.husband.name;

  const separator = document.createElement('div');
  separator.style.cssText = 'font-size:1rem;color:#c94c4c;margin:0.1rem 0;';
  separator.textContent = '❤';

  const nameW = document.createElement('div');
  nameW.className = 'name-main';
  nameW.textContent = node.wife.name;

  const subLabel = document.createElement('div');
  subLabel.className = 'name-sub';
  subLabel.textContent = `menikah · ${node.husband.born}`;

  names.appendChild(nameH);
  names.appendChild(separator);
  names.appendChild(nameW);
  names.appendChild(subLabel);

  const avatarW = document.createElement('div');
  avatarW.className = 'avatar female';
  avatarW.textContent = '👩';

  couple.appendChild(avatarH);
  couple.appendChild(names);
  couple.appendChild(avatarW);
  el.appendChild(couple);

  // If has children, show expand connector + children
  if (node.children && node.children.length > 0) {
    const connector = document.createElement('div');
    connector.className = 'connector';

    const lineV = document.createElement('div');
    lineV.className = 'line-v';
    connector.appendChild(lineV);

    el.appendChild(connector);

    // Children row
    const childrenRow = document.createElement('div');
    childrenRow.className = 'children-row';

    node.children.forEach(child => {
      const childCol = document.createElement('div');
      childCol.className = 'child-col';

      // Child name button
      const childCard = document.createElement('div');
      childCard.className = 'person-card clickable' + (child.children.length > 0 ? ' has-children' : '');

      if (child.children.length > 0) {
        const badge = document.createElement('div');
        badge.className = 'badge-children';
        badge.textContent = child.children.length;
        childCard.appendChild(badge);
      }

      // Show both husband & wife in compact form
      const cH = document.createElement('div');
      cH.className = 'name-main';
      cH.textContent = child.husband.name;

      const cSep = document.createElement('div');
      cSep.style.cssText = 'font-size:0.8rem;color:#c94c4c;margin:1px 0;';
      cSep.textContent = '& ' + child.wife.name;
      cSep.style.color = '#8c6340';
      cSep.style.fontSize = '0.78rem';
      cSep.style.fontWeight = '300';

      const hint = document.createElement('div');
      hint.className = 'expand-hint';
      hint.textContent = child.children.length > 0
        ? `▾ ${child.children.length} anak`
        : '· pasangan ·';

      childCard.appendChild(cH);
      childCard.appendChild(cSep);
      childCard.appendChild(hint);
      childCol.appendChild(childCard);

      // Subtree (hidden by default unless expanded)
      const subtree = document.createElement('div');
      subtree.className = 'subtree';
      subtree.style.display = 'none';
      childCol.appendChild(subtree);

      // Toggle expand
      if (child.children.length > 0) {
        childCard.addEventListener('click', () => {
          const isOpen = expanded.has(child.id);
          if (isOpen) {
            expanded.delete(child.id);
            subtree.innerHTML = '';
            subtree.style.display = 'none';
            hint.textContent = `▾ ${child.children.length} anak`;
            childCard.style.borderColor = '';
          } else {
            expanded.add(child.id);
            subtree.style.display = 'flex';
            subtree.style.flexDirection = 'column';
            subtree.style.alignItems = 'center';

            // vertical line down to child subtree
            const vLine = document.createElement('div');
            vLine.className = 'line-v';
            subtree.appendChild(vLine);

            const childNode = renderNode(child, depth + 1);
            subtree.appendChild(childNode);
            hint.textContent = `▴ tutup`;
            childCard.style.borderColor = 'var(--gold)';
          }
        });
      }

      childrenRow.appendChild(childCol);
    });

    el.appendChild(childrenRow);
  }

  return el;
}

function init() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  const root = renderNode(familyData, 0);
  tree.appendChild(root);
}

init();
</script>
</body>
</html>
