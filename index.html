<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pohon Silsilah Keluarga</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #b8934a;
  --gold-lt: #ddb96a;
  --cream: #faf6ee;
  --bark: #3b2a1a;
  --bark-mid: #6b4c30;
  --bark-lt: #9a7050;
  --green: #4a7c59;
  --card-bg: #ffffff;
  --shadow: 0 4px 24px rgba(59,42,26,0.10);
}

body {
  font-family: 'Lato', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  overflow-x: auto;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%, rgba(201,168,76,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 90%, rgba(74,124,89,0.07) 0%, transparent 60%);
  pointer-events: none;
}

header {
  position: relative; z-index: 2;
  text-align: center;
  padding: 2.5rem 1rem 1.5rem;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  color: var(--bark);
}
header h1 em { color: var(--gold); font-style: italic; }
header p {
  margin-top: 0.4rem;
  font-size: 0.82rem;
  color: var(--bark-lt);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.ornament {
  display: flex; align-items: center; justify-content: center;
  gap: 0.6rem; margin: 0.8rem auto 0; width: 200px;
  color: var(--gold); font-size: 0.8rem;
}
.ornament::before,.ornament::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-lt));
}
.ornament::after { background: linear-gradient(to left, transparent, var(--gold-lt)); }

#tree-wrap {
  position: relative; z-index: 1;
  padding: 0 2rem 5rem;
  overflow-x: auto;
}

/* Each column = one node + its subtree below it */
.col {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 10px;
}

/* Vertical line from node down to children */
.col-vline {
  width: 2px;
  background: linear-gradient(to bottom, var(--gold-lt), var(--bark-mid));
  flex-shrink: 0;
}

/* Row of sibling columns */
.children-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  position: relative;
}

/* ── NODE CARD ── */
.node {
  background: var(--card-bg);
  border: 1.5px solid var(--gold-lt);
  border-radius: 14px;
  box-shadow: var(--shadow);
  text-align: center;
  width: 200px;
  flex-shrink: 0;
  overflow: hidden;
  animation: popIn 0.32s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.85) translateY(-8px); }
  to   { opacity:1; transform:scale(1)    translateY(0); }
}

.node.clickable { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
.node.clickable:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 32px rgba(184,147,74,0.22);
  border-color: var(--gold);
}
.node.is-root {
  background: linear-gradient(145deg,#fffdf8,#fff8ec);
  border-color: var(--gold);
  width: 240px;
}
.node.expanded { border-color: var(--gold); background: #fffcf3; }

.node-bar {
  height: 4px;
  background: linear-gradient(90deg, var(--gold-lt), var(--gold), var(--gold-lt));
}
.node-inner { padding: 0.85rem 1rem 0.9rem; }

.couple-row {
  display: flex; align-items: center;
  justify-content: center; gap: 0.45rem;
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; border: 2px solid var(--gold-lt); flex-shrink: 0;
}
.avatar.m { background: linear-gradient(135deg,#ddeeff,#aaccee); }
.avatar.f { background: linear-gradient(135deg,#ffdde6,#ffaabb); }
.names { text-align: center; }
.name1 {
  font-family: 'Playfair Display', serif;
  font-size: 0.9rem; color: var(--bark); font-weight: 700;
  line-height: 1.25;
}
.heart { color: #c94c4c; font-size: 0.85rem; }
.sub-name { font-size: 0.75rem; color: var(--bark-lt); font-weight: 300; margin-top: 1px; }

.single-name {
  font-family: 'Playfair Display', serif;
  font-size: 0.88rem; color: var(--bark); font-weight: 700;
  line-height: 1.3;
}
.amp { font-size: 0.72rem; color: var(--bark-lt); margin-top: 2px; }
.expand-hint { font-size: 0.67rem; color: var(--gold); margin-top: 4px; opacity: 0.9; }

.badge {
  display: inline-block;
  background: var(--green); color: #fff;
  font-size: 0.58rem; font-weight: 700;
  width: 16px; height: 16px; border-radius: 50%;
  line-height: 16px; text-align: center;
  margin-left: 4px; vertical-align: middle;
  border: 1.5px solid var(--cream);
}

.gen-label {
  font-size: 0.62rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--bark-lt);
  font-weight: 700; text-align: center;
  margin-bottom: 8px; margin-top: 6px;
  width: 100%;
}

/* horizontal connector SVG overlay */
.connector-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  overflow: visible;
  pointer-events: none;
}

footer {
  position: relative; z-index: 1;
  text-align: center; padding: 1rem;
  font-size: 0.75rem; color: var(--bark-lt);
  letter-spacing: 0.08em; opacity: 0.7;
}
</style>
</head>
<body>

<header>
  <h1>Pohon Silsilah <em>Keluarga</em></h1>
  <p>Klik nama untuk melihat keturunannya</p>
  <div class="ornament">✦</div>
</header>

<div id="tree-wrap"></div>

<footer>✦ Klik kartu untuk membuka cabang keluarga ✦</footer>

<script>
// ═══════════════════════════════════════════
//  DATA KELUARGA — edit nama keluarga di sini
// ═══════════════════════════════════════════
const DATA = {
  id: 'root',
  husband: { name: 'Djamaliah', born: '1950' },
  wife:    { name: 'Rukaja' },
  children: [
    {
      id: 'c1',
      husband: { name: 'Feby Mardianti', born: '1975' },
      wife:    { name: 'Iwan Hermawan' },
      children: [
        {
          id: 'c1a',
          husband: { name: 'Muhammad Ganesh Musyafa Arias Tama', born: '2000' },
          wife:    { name: 'Gadis' },
          children: []
        },
        {
          id: 'c1b',
          husband: { name: 'Muhammad Azkal Azkiya', born: '2003' },
          wife:    { name: '-' },
          children: []
        }
      ]
    },
    {
      id: 'c2',
      husband: { name: 'Diane Utami', born: '1978' },
      wife:    { name: 'Ari Irawan' },
      children: [
        {
          id: 'c2a',
          husband: { name: 'Ardian Fatiha', born: '2005' },
          wife:    { name: '-' },
          children: []
        }
      ]
    },
    {
      id: 'c3',
      husband: { name: 'Vien', born: '1978' },
      wife:    { name: 'Hari Kuntoro' },
      children: [
        {
          id: 'c3a',
          husband: { name: 'Nadine', born: '2005' },
          wife:    { name: '-' },
          children: []
        },
        {
          id: 'c3b',
          husband: { name: 'Nabila', born: '2007' },
          wife:    { name: '-' },
          children: []
        },
        {
          id: 'c3c',
          husband: { name: 'Nadia', born: '2010' },
          wife:    { name: '-' },
          children: []
        }
      ]
    },
    {
      id: 'c4',
      husband: { name: 'Nia Silviana', born: '1980' },
      wife:    { name: 'Ferry Suhendar' },
      children: [
        {
          id: 'c4a',
          husband: { name: 'Ibrahim Alfaiz Leonel Negara', born: '2005' },
          wife:    { name: '-' },
          children: []
        },
        {
          id: 'c4b',
          husband: { name: 'Ismail', born: '2008' },
          wife:    { name: '-' },
          children: []
        }
      ]
    }
  ]
};
// ═══════════════════════════════════════════

const VGAP = 40;
const expanded = new Set();

function genName(d) {
  const g = ['Generasi Pertama','Generasi Kedua','Generasi Ketiga','Generasi Keempat','Generasi Kelima'];
  return g[d] || `Generasi ke-${d+1}`;
}

// Build a column: card + optional vertical line + children wrap
function buildCol(node, isRoot, depth) {
  const col = document.createElement('div');
  col.className = 'col';

  const card = makeCard(node, isRoot);
  col.appendChild(card);

  if (node.children && node.children.length > 0) {
    card.classList.add('clickable');

    const vline = document.createElement('div');
    vline.className = 'col-vline';
    vline.style.height = VGAP + 'px';
    col.appendChild(vline);

    const childWrap = document.createElement('div');
    childWrap.style.display = 'none';
    col.appendChild(childWrap);

    // Restore expanded state
    if (expanded.has(node.id)) {
      card.classList.add('expanded');
      childWrap.style.display = 'block';
      buildChildrenInto(node, childWrap, depth + 1);
      updateHint(card, node, true);
    }

    card.addEventListener('click', () => {
      const isOpen = expanded.has(node.id);
      if (isOpen) {
        expanded.delete(node.id);
        card.classList.remove('expanded');
        childWrap.style.display = 'none';
        childWrap.innerHTML = '';
        updateHint(card, node, false);
      } else {
        expanded.add(node.id);
        card.classList.add('expanded');
        childWrap.style.display = 'block';
        buildChildrenInto(node, childWrap, depth + 1);
        updateHint(card, node, true);
        // draw connector after paint
        requestAnimationFrame(() => {
          const row = childWrap.querySelector('.children-row');
          if (row) drawHBar(row);
        });
      }
    });
  }

  return col;
}

function buildChildrenInto(node, wrap, depth) {
  wrap.innerHTML = '';

  const lbl = document.createElement('div');
  lbl.className = 'gen-label';
  lbl.textContent = genName(depth);
  wrap.appendChild(lbl);

  const row = document.createElement('div');
  row.className = 'children-row';
  wrap.appendChild(row);

  node.children.forEach(child => {
    row.appendChild(buildCol(child, false, depth));
  });

  // Draw h-bar after paint
  requestAnimationFrame(() => drawHBar(row));
}

// Draw a horizontal bar connecting all sibling top-centers
function drawHBar(row) {
  // remove old svg
  const old = row.querySelector(':scope > .connector-svg');
  if (old) old.remove();

  const cols = row.querySelectorAll(':scope > .col');
  if (cols.length < 2) return;

  const cards = Array.from(cols).map(c => c.querySelector('.node'));
  if (cards.some(c => !c)) return;

  const rowRect = row.getBoundingClientRect();
  const xs = cards.map(c => {
    const r = c.getBoundingClientRect();
    return r.left + r.width / 2 - rowRect.left;
  });

  const x1 = xs[0];
  const x2 = xs[xs.length - 1];
  const y  = 0;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('connector-svg');
  svg.style.width  = rowRect.width + 'px';
  svg.style.height = '2px';

  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', x1); line.setAttribute('y1', 1);
  line.setAttribute('x2', x2); line.setAttribute('y2', 1);
  line.setAttribute('stroke','#c9a87a');
  line.setAttribute('stroke-width','2');
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);

  row.insertBefore(svg, row.firstChild);
}

function updateHint(card, node, open) {
  const hint = card.querySelector('.expand-hint');
  if (hint) hint.textContent = open ? '▴ tutup' : `▾ ${node.children.length} anak`;
}

function makeCard(node, isRoot) {
  const el = document.createElement('div');
  el.className = 'node' + (isRoot ? ' is-root' : '');

  const bar = document.createElement('div');
  bar.className = 'node-bar';
  el.appendChild(bar);

  const inner = document.createElement('div');
  inner.className = 'node-inner';

  if (isRoot) {
    const row = document.createElement('div');
    row.className = 'couple-row';

    const avH = document.createElement('div');
    avH.className = 'avatar m'; avH.textContent = '👨';

    const names = document.createElement('div');
    names.className = 'names';
    names.innerHTML = `
      <div class="name1">${node.husband.name}</div>
      <div class="heart">♥</div>
      <div class="name1">${node.wife.name}</div>
      <div class="sub-name">menikah · ${node.husband.born || ''}</div>
    `;

    const avW = document.createElement('div');
    avW.className = 'avatar f'; avW.textContent = '👩';

    row.append(avH, names, avW);
    inner.appendChild(row);
  } else {
    const wifeText = node.wife.name !== '-' ? '& ' + node.wife.name : '';
    const hasKids = node.children && node.children.length > 0;
    const badge = hasKids ? `<span class="badge">${node.children.length}</span>` : '';
    inner.innerHTML = `
      <div class="single-name">${node.husband.name}${badge}</div>
      ${wifeText ? `<div class="amp">${wifeText}</div>` : ''}
      ${hasKids ? `<div class="expand-hint">▾ ${node.children.length} anak</div>` : ''}
    `;
  }

  el.appendChild(inner);
  return el;
}

// ── Init ──
function init() {
  const wrap = document.getElementById('tree-wrap');
  wrap.innerHTML = '';

  const lbl = document.createElement('div');
  lbl.className = 'gen-label';
  lbl.style.paddingTop = '1rem';
  lbl.textContent = genName(0);
  wrap.appendChild(lbl);

  const center = document.createElement('div');
  center.style.cssText = 'display:flex;justify-content:center;';
  wrap.appendChild(center);

  center.appendChild(buildCol(DATA, true, 0));

  // After root children rendered, draw h-bars
  requestAnimationFrame(() => {
    wrap.querySelectorAll('.children-row').forEach(drawHBar);
  });
}

init();
</script>
</body>
</html>
